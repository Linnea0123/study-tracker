<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    
    <!-- ✅ 手机端视图配置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    
    <!-- ✅ 状态栏/灵动岛颜色 - 改为你的主题色 -->
    <meta name="theme-color" content="#fcfdff" />
    
    <!-- ✅ iOS 专用：状态栏样式（改为 default 让内容自动避开） -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    
    <meta
      name="description"
      content="学习记录 - 作业跟踪与时间管理"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    
    <title>学习记录</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #fcfdff">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root" style="background-color: #fcfdff; min-height: 100vh"></div>
  </body>
</html>
